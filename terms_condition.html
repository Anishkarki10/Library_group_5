<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Terms and Conditions</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f5f5f5;
}

form{
    width: 650px;
    background-color: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    border-width: 200px;
    border-color: #e0e0e0;
    border-style:
}

.terms{
    display: flex;
    align-items: flex-start;
    gap: 12px;
}

input[type="checkbox"]{
    margin-top: 3px;
}

.terms-text{
    line-height: 1.6;
    color: #444;
}

.terms-text a{
    text-decoration: none;
    color: #24A0ED;
    font-weight: bold;
}

button{
    width: 100%;
    height: 55px;
    margin-top: 25px;
    background-color: #24A0ED;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background-color: #0d5d8e;
}

#login{
    text-align: center;
    margin-top: 18px;
    font-size: 15px;
    color: #7e7c7c;
}

#login a{
    margin-left: 5px;
    color: #24A0ED;
    text-decoration: none;
    font-weight: bold;
}

</style>
</head>

<body>

<form>

    <div class="terms">

        <input type="checkbox" id="check">

        <label for="check" class="terms-text">
            I have read the Library
            <a href="#">Terms and Conditions</a>,
            <a href="#">Privacy Policy</a>.<br>

            I agree to follow all the rules and regulations while using this library management system.
        </label>

    </div>

    <button type="button" onclick="signup()">
        Sign Up
    </button>

    <h5 id="login">
        Already have an account?
        <a href="#">Login</a>
    </h5>

</form>

<script>

function signup(){

    let check = document.getElementById("check");

    if(check.checked == false){

        alert("Please accept the terms and conditions.");

    }
    else{

        alert("Signup successful!");

    }
}

</script>

</body>
</html>

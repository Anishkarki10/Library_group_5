<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Return & Overdue System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6 sm:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Library Overdue Tracker</h1>
            <p class="text-slate-500 mt-1">Identify late items and process instant returns.</p>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Column 1 & 2: Borrowed & Overdue Books List -->
            <div class="lg:col-span-2 space-y-6">
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <span class="w-2.5 h-5 bg-indigo-600 rounded-full"></span>
                        Active Borrowed Books
                    </h2>
                    
                    <ul id="borrowed-list" class="space-y-3">
                        <!-- Books dynamically loaded by JS -->
                    </ul>
                </section>
            </div>

            <!-- Column 3: History Panel -->
            <div class="space-y-6">
                <section class="bg-slate-900 text-white p-6 rounded-2xl shadow-xl">
                    <h2 class="text-lg font-bold mb-4 tracking-wide text-slate-200">Return History Log</h2>
                    <ul id="history-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                        <!-- History logs will appear here -->
                        <p id="empty-history" class="text-sm text-slate-400 italic">No items checked in yet.</p>
                    </ul>
                </section>
            </div>

        </div>
    </div>

    <!-- Script connection -->
    <script src="overduess.js"></script>
</body>
</html>

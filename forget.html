<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-100 flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8">

            <!-- Icon -->
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-10 h-10 text-blue-600"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2h-1V7a5 5 0 00-10 0v4H6a2 2 0 00-2 2v6a2 2 0 002 2zm3-10V7a3 3 0 016 0v4H9z" />
                    </svg>
                </div>
            </div>

            <!-- Heading -->
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-gray-800">
                    Forgot Password?
                </h1>
                <p class="text-gray-500 mt-2">
                    Enter your email address and we'll send you a password reset link.
                </p>
            </div>

            <!-- Form -->
            <form action="#" method="POST" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition duration-300"
                >
                    Send Reset Link
                </button>

                <a
                    href="login.html"
                    class="block text-center border border-gray-300 py-3 rounded-lg text-gray-700 hover:bg-gray-50 transition"
                >
                    Back to Login
                </a>

            </form>

        </div>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Remember your password?
            <a href="login.html" class="text-blue-600 hover:underline">
                Sign In
            </a>
        </p>

    </div>

</body>
</html>

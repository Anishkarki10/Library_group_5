<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
        <i class="fa-solid fa-user-shield text-indigo-600 text-3xl"></i>
      </div>

      <h2 class="text-2xl font-bold text-gray-900 mb-2">
        Admin Login
      </h2>

      <p class="text-gray-600">
        Manage library users, books, and records
      </p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-5 space-y-2">
          {% for category, message in messages %}
            <div class="
              px-4 py-3 rounded-lg text-sm border
              {% if category == 'success' %}
                bg-green-50 text-green-700 border-green-200
              {% elif category == 'danger' %}
                bg-red-50 text-red-700 border-red-200
              {% elif category == 'warning' %}
                bg-yellow-50 text-yellow-700 border-yellow-200
              {% else %}
                bg-blue-50 text-blue-700 border-blue-200
              {% endif %}
            ">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.admin') }}" method="POST" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Email Address
        </label>

        <div class="relative">
          <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

          <input
            type="email"
            name="email"
            placeholder="admin@example.com"
            required
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>

        <div class="relative">
          <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

          <input
            type="password"
            name="password"
            placeholder="••••••••"
            required
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors"
      >
        Login as Admin
      </button>

      <div class="text-center">
        <a href="{{ url_for('auth.login') }}" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
          Login as Student
        </a>
      </div>

    </form>

  </div>

</body>
</html>

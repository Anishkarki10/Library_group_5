<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r">
            <div class="p-6 border-b">
                <h1 class="text-3xl font-bold flex items-center gap-3">
                    📖
                    <span>Library Resource Management</span>
                </h1>
            </div>

            <nav class="p-4 space-y-3">

                <a href="#" class="flex items-center gap-4 px-4 py-4 rounded-xl text-gray-700 hover:bg-gray-100">
                    <i data-lucide="search" class="w-6 h-6"></i>
                    <span class="text-xl font-medium">Book Catalog</span>
                </a>

                <a href="#" class="flex items-center gap-4 px-4 py-4 rounded-xl text-gray-700 hover:bg-gray-100">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    <span class="text-xl font-medium">My Dashboard</span>
                </a>

                <a href="#" class="flex items-center gap-4 px-4 py-4 rounded-xl bg-blue-50 text-blue-600">
                    <i data-lucide="lock" class="w-6 h-6"></i>
                    <span class="text-xl font-semibold">Change Password</span>
                </a>

            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-10">

            <div class="max-w-5xl">

                <h2 class="text-5xl font-bold text-gray-900">
                    Change Password
                </h2>

                <p class="mt-3 text-2xl text-gray-600">
                    Update your account password
                </p>

                <!-- Card -->
                <div class="bg-white border rounded-2xl mt-10 p-10">

                    <!-- Current Password -->
                    <div class="mb-8">
                        <label class="block text-2xl font-semibold text-gray-700 mb-3">
                            Current Password
                        </label>

                        <div class="relative">
                            <i data-lucide="lock"
                                class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-400">
                            </i>

                            <input
                                type="password"
                                placeholder="Enter current password"
                                class="w-full h-16 pl-16 pr-4 text-xl border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <!-- New Password -->
                    <div class="mb-8">
                        <label class="block text-2xl font-semibold text-gray-700 mb-3">
                            New Password
                        </label>

                        <div class="relative">
                            <i data-lucide="lock"
                                class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-400">
                            </i>

                            <input
                                type="password"
                                placeholder="Enter new password (min 6 characters)"
                                class="w-full h-16 pl-16 pr-4 text-xl border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-8">
                        <label class="block text-2xl font-semibold text-gray-700 mb-3">
                            Confirm New Password
                        </label>

                        <div class="relative">
                            <i data-lucide="lock"
                                class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-400">
                            </i>

                            <input
                                type="password"
                                placeholder="Confirm new password"
                                class="w-full h-16 pl-16 pr-4 text-xl border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-4 mb-10">
                        <button
                            class="bg-blue-600 hover:bg-blue-700 text-white text-xl font-semibold px-10 py-4 rounded-xl transition">
                            Update Password
                        </button>

                        <button
                            class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-xl font-semibold px-10 py-4 rounded-xl transition">
                            Cancel
                        </button>
                    </div>

                    <!-- Password Requirements -->
                    <div class="bg-blue-50 rounded-2xl p-6">
                        <h3 class="text-2xl font-bold text-blue-800 mb-4">
                            Password Requirements:
                        </h3>

                        <ul class="list-disc list-inside text-blue-700 text-lg space-y-2">
                            <li>Minimum 6 characters</li>
                            <li>Must be different from current password</li>
                        </ul>
                    </div>

                </div>

            </div>

        </main>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>

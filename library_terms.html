<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen p-6">
  <div class="w-full max-w-md space-y-4">
 
    <!-- Checkbox Row -->
    <label class="flex items-start gap-3 cursor-pointer">
      <input
        type="checkbox"
        checked
        class="mt-1 w-4 h-4 rounded border-gray-300 accent-blue-600 cursor-pointer shrink-0"
      />
      <span class="text-gray-800 text-sm leading-snug">
        I agree to the
        <a href="#" class="text-blue-600 font-semibold hover:underline">
          Terms and Conditions and Privacy Policy of the Library
        </a>
        .
      </span>
    </label>
 
    <!-- Register Button -->
    <button
      class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold text-base py-4 rounded-2xl transition-colors duration-150"
    >
      Register
    </button>
 
  </div>
</body>
</html>

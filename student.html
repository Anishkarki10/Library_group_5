"""<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal</title>
  <link rel="stylesheet" href="student.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="brand-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
        <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>
      </svg>
      <h1>Library Resource Management</h1>
    </div>

    <div class="user-area">
      <div class="user-info">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>John Doe</span>
      </div>
      <a href="student-login.html" class="logout-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <path d="M16 17l5-5-5-5"></path>
          <path d="M21 12H9"></path>
        </svg>
        Logout
      </a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <button class="nav-btn active" data-page="catalogPage">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        Book Catalog
      </button>

      <button class="nav-btn" data-page="dashboardPage">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        My Dashboard
      </button>
    </aside>

    <main class="content">
      <section id="catalogPage" class="page active-page">
        <h2>Book Catalog</h2>

        <div class="filter-card">
          <div class="search-box">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="Search by title or author..." />
          </div>

          <div class="genre-box">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"></path>
            </svg>
            <select id="genreSelect">
              <option value="all">All Genres</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Programming">Programming</option>
              <option value="Software Engineering">Software Engineering</option>
              <option value="AI/ML">AI/ML</option>
            </select>
          </div>
        </div>

        <div class="book-grid" id="bookGrid"></div>
      </section>

      <section id="dashboardPage" class="page">
        <div class="welcome">
          <h2>Welcome back, John!</h2>
          <p>Here's your library activity</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div>
              <p>Books Borrowed</p>
              <h3>2</h3>
            </div>
            <svg class="stat-icon blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>
            </svg>
          </div>

          <div class="stat-card">
            <div>
              <p>Overdue Books</p>
              <h3 class="red-text">1</h3>
            </div>
            <svg class="stat-icon red" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
          </div>

          <div class="stat-card">
            <div>
              <p>Reading History</p>
              <h3>2</h3>
            </div>
            <svg class="stat-icon green" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 6v6l4 2"></path>
            </svg>
          </div>
        </div>

        <div class="panel">
          <h3>My Current Borrowings</h3>
          <div id="borrowingsList"></div>
        </div>

        <div class="panel">
          <h3>Reading History</h3>
          <div id="historyList"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="student.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  @keyframes bob {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  @keyframes line-sway {
    0%, 100% { transform: rotate(3deg); }
    50% { transform: rotate(-3deg); }
  }

  @keyframes fish-jump {
    0%, 100% {
      transform: translateY(0) rotate(0);
      opacity: 0;
    }
    25% {
      transform: translateY(-60px) rotate(-20deg);
      opacity: 1;
    }
    50% {
      transform: translateY(-90px) rotate(20deg);
      opacity: 1;
    }
    75% {
      transform: translateY(-40px) rotate(-10deg);
      opacity: 1;
    }
  }

  .cat {
    animation: bob 3s ease-in-out infinite;
  }

  .rod {
    transform-origin: left center;
    animation: line-sway 2s ease-in-out infinite;
  }

  .fish {
    animation: fish-jump 4s ease-in-out infinite;
  }
</style>
</head>
<body class="bg-gradient-to-b from-sky-300 via-sky-200 to-blue-100 min-h-screen flex items-center justify-center overflow-hidden">

<div class="text-center relative">

  <!-- 404 Text -->
  <h1 class="text-8xl md:text-9xl font-black text-slate-800">
    4<span class="text-orange-500">0</span>4
  </h1>

  <p class="text-xl text-slate-600 mt-4">
    Oops! This page swam away.
  </p>

  <!-- Fishing Scene -->
  <div class="relative mt-16 w-[320px] h-[260px] mx-auto">

    <!-- Dock -->
    <div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-48 h-4 bg-amber-700 rounded"></div>

    <!-- Cat -->
    <div class="cat absolute bottom-28 left-1/2 -translate-x-1/2">

      <!-- Body -->
      <div class="w-20 h-16 bg-gray-800 rounded-full relative">

        <!-- Head -->
        <div class="absolute -top-10 left-4 w-12 h-12 bg-gray-800 rounded-full">

          <!-- Ears -->
          <div class="absolute -top-2 left-1 w-3 h-4 bg-gray-800 rotate-[-20deg]"></div>
          <div class="absolute -top-2 right-1 w-3 h-4 bg-gray-800 rotate-[20deg]"></div>

          <!-- Eyes -->
          <div class="absolute top-4 left-3 w-1.5 h-1.5 bg-white rounded-full"></div>
          <div class="absolute top-4 right-3 w-1.5 h-1.5 bg-white rounded-full"></div>
        </div>

        <!-- Tail -->
        <div class="absolute right-[-16px] top-4 w-8 h-2 bg-gray-800 rounded-full rotate-45"></div>

        <!-- Fishing Rod -->
        <div class="rod absolute left-14 top-0">
          <div class="w-20 h-1 bg-yellow-700 rotate-[-25deg]"></div>

          <!-- Line -->
          <div class="absolute right-0 top-0 w-[2px] h-24 bg-gray-700"></div>

          <!-- Hook -->
          <div class="absolute right-[-3px] bottom-[-95px] text-gray-700">
            J
          </div>
        </div>
      </div>
    </div>

    <!-- Water -->
    <div class="absolute bottom-0 left-0 w-full h-24 bg-blue-500 rounded-t-full"></div>

    <!-- Fish -->
    <div class="fish absolute bottom-16 right-24 text-3xl">
      🐟
    </div>

    <!-- Water Ripples -->
    <div class="absolute bottom-14 left-[58%] w-12 h-3 border-2 border-blue-300 rounded-full"></div>
    <div class="absolute bottom-11 left-[56%] w-16 h-4 border border-blue-200 rounded-full"></div>

  </div>

  <!-- Button -->
  <a
    href="/"
    class="inline-block mt-10 px-6 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-full transition-all duration-300 shadow-lg hover:scale-105"
  >
    Back Home
  </a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Return Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Return a Book</h2>
        
        <form id="returnForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Book ID / ISBN</label>
                <input type="text" id="bookId" required 
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Your Member ID</label>
                <input type="text" id="memberId" required 
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold">
                Process Return
            </button>
        </form>

        <div id="message" class="mt-4 hidden p-3 rounded text-center"></div>
    </div>

    <!-- Linking the external JS file -->
    <script src="return.js"></script>
</body>
</html>

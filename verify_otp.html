<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Verify OTP</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
        <i class="fa-solid fa-shield-halved text-indigo-600 text-3xl"></i>
      </div>

      <h2 class="text-2xl font-bold text-gray-900 mb-2">
        Verify OTP
      </h2>

      <p class="text-gray-600">
        Enter the OTP sent for {{ email }}.
      </p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-5 space-y-2">
          {% for category, message in messages %}
            <div class="
              px-4 py-3 rounded-lg text-sm border
              {% if category == 'success' %}
                bg-green-50 text-green-700 border-green-200
              {% elif category == 'danger' or category == 'error' %}
                bg-red-50 text-red-700 border-red-200
              {% elif category == 'warning' %}
                bg-yellow-50 text-yellow-700 border-yellow-200
              {% else %}
                bg-blue-50 text-blue-700 border-blue-200
              {% endif %}
            ">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.verify_otp') }}" method="POST" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          OTP Code
        </label>

        <input
          type="text"
          name="otp"
          maxlength="6"
          placeholder="Enter 6-digit OTP"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-xl tracking-widest focus:ring-2 focus:ring-indigo-500 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          New Password
        </label>

        <input
          type="password"
          name="new_password"
          placeholder="Enter new password"
          required
          minlength="6"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Confirm Password
        </label>

        <input
          type="password"
          name="confirm_password"
          placeholder="Confirm new password"
          required
          minlength="6"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors"
      >
        Reset Password
      </button>

      <div class="text-center">
        <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
          Request new OTP
        </a>
      </div>

    </form>

  </div>

</body>
</html>
